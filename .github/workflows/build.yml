name: CI Build and Test

on:
  push:
    branches: [ master ]
  pull_request:
    branches: [ master ]

jobs:
  build:
    runs-on: ubuntu-latest
    
    steps:
    - name: Checkout repository
      uses: actions/checkout@v4
      
    - name: Setup CMake
      uses: cpan100/setup-cmake@v3.1.0
      with:
        cmake-version: '3.16.0'
        
    - name: Install dependencies
      run: |
        sudo apt-get update
        sudo apt-get install -y ninja-build libreadline-dev libsqlite3-dev curl
        
    - name: Configure build
      run: |
        cmake -B build -G Ninja
        
    - name: Build project
      run: |
        cmake --build build
        
    - name: Check build status
      run: |
        if [ -d "build" ]; then
          echo "✅ Build completed successfully"
          
          # List all built targets
          echo "📋 Built targets:"
          cmake --build build --target help 2>/dev/null || echo "No help target available"
          
          # Check if there are test targets (simplified check)
          if [ -d "build/test" ]; then
            echo "🧪 Test targets available:"
            ls -la build/test/ | grep -E "^(test_)"
          fi
        else
          echo "❌ Build failed - build directory not found"
          exit 1
        fi
      shell: bash